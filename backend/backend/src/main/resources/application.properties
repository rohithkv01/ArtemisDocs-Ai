# ============================================
# ArtemisDocs-AI - Application Configuration
# ============================================

spring.application.name=ArtemisDocs-AI

# ---- MySQL Database Configuration ----
spring.datasource.url=jdbc:mysql://localhost:3306/artemisdocs_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Rohi@888
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate Configuration ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- File Upload Configuration ----
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ---- Upload Directory ----
upload.directory=uploads

# ---- Gemini AI Configuration ----
gemini.api-key=YOUR_GEMINI_API_KEY
gemini.model-name=gemini-2.0-flash

# ---- RAG Configuration ----
rag.confidence-threshold=0.65
rag.chunk-size=500
rag.chunk-overlap=50
rag.max-results=5

# ---- Server Configuration ----
server.port=8080
